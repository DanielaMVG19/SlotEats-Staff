<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Globales - SlotEats Staff</title>
    <style>
        :root { --primary: #e84118; --dark: #2f3542; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: white; padding: 15px 25px; border-radius: 15px; margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .pedido-card { 
            background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; border-left: 6px solid var(--primary);
        }
        .status-badge { 
            position: absolute; top: 20px; right: 20px; 
            padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: bold;
            background: #eee; color: var(--dark); text-transform: uppercase;
        }
        .status-Recibido { background: #d1ecf1; color: #0c5460; }
        .status-Preparando { background: #fff3cd; color: #856404; }
        .status-En-camino { background: #d4edda; color: #155724; }
        
        .items-list { color: #555; font-size: 14px; margin: 15px 0; padding-left: 20px; }
        .total-price { font-size: 22px; font-weight: 900; color: var(--primary); }
        .info-entrega { 
            font-size: 13px; color: #777; margin-top: 15px; 
            border-top: 1px dashed #ddd; padding-top: 10px; line-height: 1.6;
        }
        .btn-logout { background: #eee; color: #666; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; text-decoration: none; font-size: 13px; }

        /* Estilo del nuevo botón Completado */
        .btn-completar {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }
        .btn-completar:hover {
            background: #219150;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h2 style="margin:0; color:var(--dark);">SlotEats Staff 🛵</h2>
            <small id="nombreRepartidor" style="color:var(--primary); font-weight:bold;"></small>
        </div>
        <a href="/" class="btn-logout" onclick="localStorage.clear()">Cerrar Sesión</a>
    </header>

    <div id="listaPedidos">
        <p style="text-align:center; color:#999;">Conectando con la central de pedidos...</p>
    </div>
</div>

<script>
    async function cargarPedidosGlobales() {
        const user = JSON.parse(localStorage.getItem('usuario'));
        if (!user) {
            window.location.href = "/";
            return;
        }

        document.getElementById('nombreRepartidor').innerText = `Repartidor: ${user.nombre}`;

        try {
            const res = await fetch(`/mis-pedidos/${user.email}`);
            if (!res.ok) throw new Error("Error en el servidor");
            
            const pedidos = await res.json();
            const contenedor = document.getElementById('listaPedidos');

            if (!pedidos || pedidos.length === 0) {
                contenedor.innerHTML = `
                    <div style="text-align:center; margin-top:50px;">
                        <h1 style="font-size:50px;">😴</h1>
                        <p style="color:#999;">No hay pedidos pendientes en este momento.</p>
                    </div>`;
                return;
            }

            contenedor.innerHTML = pedidos.map(p => {
                const listaItems = (p.items && Array.isArray(p.items)) 
                    ? p.items.map(item => `<li><b>${item.cantidad || 1}x</b> ${item.nombre || 'Producto'} - $${item.precio || 0}</li>`).join('')
                    : '<li>Detalles no disponibles</li>';

                const badgeClass = p.estatus ? p.estatus.replace(/\s+/g, '-') : 'Recibido';

                return `
                <div class="pedido-card">
                    <div class="status-badge status-${badgeClass}">${p.estatus || 'Recibido'}</div>
                    <div style="font-size: 10px; color: #ccc;">ID: ${p._id}</div>
                    <div style="font-weight: bold; margin: 10px 0; font-size: 16px;">
                        📅 ${p.fecha ? new Date(p.fecha).toLocaleString() : 'Fecha no disponible'}
                    </div>
                    
                    <ul class="items-list">
                        ${listaItems}
                    </ul>

                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div class="total-price">$${p.total ? p.total.toFixed(2) : '0.00'}</div>
                    </div>

                    <div class="info-entrega">
                        📍 <b>Dirección:</b> ${p.ubicacion || 'Consultar con el cliente'}<br>
                        📏 <b>Distancia:</b> ${p.distanciaKm || '?'} km
                    </div>

                    <button class="btn-completar" onclick="marcarCompletado('${p._id}')">
                        Marcar como Entregado ✅
                    </button>
                </div>
                `;
            }).join('');

        } catch (error) {
            console.error("Error:", error);
            document.getElementById('listaPedidos').innerHTML = `<p style="text-align:center; color:red;">Error al cargar datos.</p>`;
        }
    }

    async function marcarCompletado(idPedido) {
        if(!confirm("¿Confirmas que el pedido ha sido entregado al cliente?")) return;

        try {
            const res = await fetch(`/completar-pedido/${idPedido}`, {
                method: 'POST'
            });
            const data = await res.json();
            
            if(res.ok) {
                alert("¡Buen trabajo! Pedido finalizado.");
                cargarPedidosGlobales(); // Refrescar la lista
            } else {
                alert("Error: " + data.msg);
            }
        } catch (error) {
            alert("Hubo un problema al conectar con el servidor.");
        }
    }

    window.onload = cargarPedidosGlobales;
    setInterval(cargarPedidosGlobales, 30000);
</script>
</body>
</html>
